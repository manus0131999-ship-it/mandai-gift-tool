<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万代ギフト 配送判定ツール</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #22c55e;
            --error: #ef4444;
            --info: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            width: 100%;
            max-width: 450px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            padding: 24px;
            border: 1px solid var(--border);
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.025em;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 500;
            margin-top: 8px;
        }
        .status-loading { background: #fef3c7; color: #92400e; }
        .status-ready { background: #dcfce7; color: #166534; }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.2s;
            background: #fcfcfc;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            background: #fff;
        }

        .product-preview {
            margin-top: 8px;
            font-size: 13px;
            color: var(--text-muted);
            min-height: 18px;
            padding-left: 4px;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background-color: var(--border);
            cursor: not-allowed;
        }

        #result {
            margin-top: 24px;
            padding: 16px;
            border-radius: 12px;
            display: none;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .res-error { background-color: #fef2f2; border: 1px solid #fee2e2; color: #991b1b; }
        .res-success { background-color: #f0fdf4; border: 1px solid #dcfce7; color: #166534; }
        .res-info { background-color: #eff6ff; border: 1px solid #dbeafe; color: #1e40af; }

        .res-title { font-weight: 700; margin-bottom: 4px; font-size: 15px; }
        .res-body { font-size: 14px; line-height: 1.5; }

        .island-list { margin-top: 12px; display: grid; gap: 8px; }
        .island-item { 
            padding: 10px 14px; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            cursor: pointer; 
            background: white; 
            font-size: 13px;
            transition: all 0.2s;
        }
        .island-item:hover { 
            border-color: var(--primary); 
            background: var(--bg);
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="card">
        <header>
            <h1>万代ギフト 配送判定</h1>
            <div id="dataStatus" class="status-badge status-loading">データ読み込み中...</div>
        </header>

        <div class="form-group">
            <label for="productCode">商品番号</label>
            <input type="text" id="productCode" placeholder="例: 7201" autocomplete="off">
            <div id="productName" class="product-preview"></div>
        </div>

        <div class="form-group">
            <label for="location">配送先（郵便番号 または 島名）</label>
            <input type="text" id="location" placeholder="例: 100-0100 または 大島" autocomplete="off">
        </div>

        <button id="checkBtn" onclick="checkDelivery()" disabled>判定する</button>

        <div id="result"></div>
    </div>

    <script>
        let catalog = [];
        const sagawaData = [{"postalCode": "100-0100", "city": "東京都", "area": "大島町"}, {"postalCode": "100-0211", "city": "東京都", "area": "大島町差木地"}, {"postalCode": "100-0101", "city": "東京都", "area": "大島町元町"}, {"postalCode": "100-0102", "city": "東京都", "area": "大島町岡田"}, {"postalCode": "100-0103", "city": "東京都", "area": "大島町泉津"}, {"postalCode": "100-0104", "city": "東京都", "area": "大島町野増"}, {"postalCode": "100-0212", "city": "東京都", "area": "大島町波浮港"}, {"postalCode": "100-0400", "city": "東京都", "area": "新島村"}, {"postalCode": "100-0402", "city": "東京都", "area": "新島村本村"}, {"postalCode": "100-0401", "city": "東京都", "area": "新島村若郷"}, {"postalCode": "100-0500", "city": "東京都", "area": "利島村"}, {"postalCode": "100-0601", "city": "東京都", "area": "神津島村"}, {"postalCode": "100-1100", "city": "東京都", "area": "三宅島三宅村"}, {"postalCode": "100-1101", "city": "東京都", "area": "三宅島三宅村神着"}, {"postalCode": "100-1102", "city": "東京都", "area": "三宅島三宅村伊豆"}, {"postalCode": "100-1103", "city": "東京都", "area": "三宅島三宅村伊ヶ谷"}, {"postalCode": "100-1211", "city": "東京都", "area": "三宅島三宅村阿古"}, {"postalCode": "100-1212", "city": "東京都", "area": "三宅島三宅村坪田"}, {"postalCode": "100-1401", "city": "東京都", "area": "八丈島八丈町大賀郷"}, {"postalCode": "100-1400", "city": "東京都", "area": "八丈島八丈町"}, {"postalCode": "100-1511", "city": "東京都", "area": "八丈島八丈町三根"}, {"postalCode": "100-1621", "city": "東京都", "area": "八丈島八丈町樫立"}, {"postalCode": "100-1622", "city": "東京都", "area": "八丈島八丈町中之郷"}, {"postalCode": "100-1623", "city": "東京都", "area": "八丈島八丈町末吉"}, {"postalCode": "100-2100", "city": "東京都", "area": "小笠原村"}, {"postalCode": "100-2101", "city": "東京都", "area": "小笠原村父島"}, {"postalCode": "100-2211", "city": "東京都", "area": "小笠原村母島"}];
        const yamatoData = [{"island": "大島", "city": "東京都大島町", "postalCodes": ["100-0101", "100-0102", "100-0103", "100-0104", "100-0211", "100-0212"]}, {"island": "利島", "city": "東京都利島村", "postalCodes": ["100-0501"]}, {"island": "新島", "city": "東京都新島村", "postalCodes": ["100-0401", "100-0402"]}, {"island": "式根島", "city": "東京都新島村", "postalCodes": ["100-0411"]}, {"island": "神津島", "city": "東京都神津島村", "postalCodes": ["100-0601"]}, {"island": "三宅島", "city": "東京都三宅村", "postalCodes": ["100-1101", "100-1102", "100-1103", "100-1211", "100-1212"]}, {"island": "御蔵島", "city": "東京都御蔵島村", "postalCodes": ["100-1301"]}, {"island": "八丈島", "city": "東京都八丈町", "postalCodes": ["100-1401", "100-1511", "100-1621", "100-1622", "100-1623"]}, {"island": "青ヶ島", "city": "東京都青ヶ島村", "postalCodes": ["100-1701"]}, {"island": "父島", "city": "東京都小笠原村", "postalCodes": ["100-2101"]}, {"island": "母島", "city": "東京都小笠原村", "postalCodes": ["100-2211"]}];

        // CSVデータの読み込み
        function loadCatalog() {
            const csvUrl = 'FGアプリ用.csv';
            Papa.parse(csvUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    catalog = results.data.map(row => ({
                        id: row['商品番号']?.trim(),
                        name: row['商品名']?.trim(),
                        carrier: row['配送会社']?.trim(),
                        frozen: row['冷凍']?.toUpperCase() === 'TRUE',
                        chilled: row['冷蔵']?.toUpperCase() === 'TRUE',
                        unavailable_flag: row['お届け不可地域']?.toUpperCase() === 'TRUE'
                    })).filter(p => p.id);
                    
                    document.getElementById('dataStatus').textContent = 'Ready';
                    document.getElementById('dataStatus').className = 'status-badge status-ready';
                    document.getElementById('checkBtn').disabled = false;
                    console.log('Catalog loaded:', catalog.length, 'items');
                },
                error: function(err) {
                    console.error('CSV Load Error:', err);
                    document.getElementById('dataStatus').textContent = 'CSV読み込みエラー';
                    document.getElementById('dataStatus').className = 'status-badge status-error';
                }
            });
        }

        const productInput = document.getElementById('productCode');
        const locationInput = document.getElementById('location');
        const productNameDiv = document.getElementById('productName');
        const resultDiv = document.getElementById('result');

        productInput.addEventListener('input', () => {
            const code = productInput.value.trim();
            const product = catalog.find(p => p.id === code);
            if (product) {
                productNameDiv.textContent = "商品: " + product.name;
            } else {
                productNameDiv.textContent = "";
            }
        });

        function showResult(title, body, type) {
            resultDiv.innerHTML = `<div class="res-title">${title}</div><div class="res-body">${body}</div>`;
            resultDiv.className = 'res-' + type;
            resultDiv.style.display = 'block';
            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function checkDelivery() {
            const code = productInput.value.trim();
            const loc = locationInput.value.trim();
            resultDiv.style.display = 'none';

            if (!code || !loc) {
                showResult('入力エラー', '商品番号と配送先を入力してください。', 'error');
                return;
            }

            const product = catalog.find(p => p.id === code);
            if (!product) {
                showResult('未登録', '該当する商品番号が見つかりません。', 'error');
                return;
            }

            // カタログ自体の制限チェック
            if (product.unavailable_flag) {
                showResult('配送不可', `「${product.name}」は入力された地域への配送が出来ません。`, 'error');
                return;
            }

            const isPostal = /^\d{3}-?\d{4}$/.test(loc) || /^\d{7}$/.test(loc);
            const cleanPostal = loc.replace('-', '');
            
            let isUnavailable = false;
            let matches = [];

            if (product.carrier === '佐川') {
                if (isPostal) {
                    isUnavailable = sagawaData.some(d => d.postalCode.replace('-', '') === cleanPostal);
                } else {
                    matches = sagawaData.filter(d => d.city.includes(loc) || d.area.includes(loc));
                    // 重複排除
                    const seen = new Set();
                    matches = matches.filter(m => {
                        const key = m.city + m.area;
                        return seen.has(key) ? false : seen.add(key);
                    });
                }
            } else {
                // デフォルトはヤマト
                if (isPostal) {
                    isUnavailable = yamatoData.some(d => d.postalCodes.some(p => p.replace('-', '') === cleanPostal));
                } else {
                    matches = yamatoData.filter(d => d.island.includes(loc) || d.city.includes(loc));
                }
            }

            if (isUnavailable) {
                showResult('配送不可', `「${product.name}」は入力された地域への配送が出来ません。`, 'error');
            } else if (matches.length > 1) {
                let html = '検索されたワードでは該当が複数存在します。下記から選択してください：<div class="island-list">';
                matches.forEach(m => {
                    const name = product.carrier === '佐川' ? (m.city + ' ' + m.area) : (m.island + ' (' + m.city + ')');
                    html += `<div class="island-item" onclick="selectIsland('${name}')">${name}</div>`;
                });
                html += '</div>';
                showResult('地域を選択してください', html, 'info');
            } else if (matches.length === 1) {
                showResult('配送不可', `「${product.name}」は入力された地域への配送が出来ません。`, 'error');
            } else {
                showResult('配送可能', `「${product.name}」は指定の地域へ配送可能です。`, 'success');
            }
        }

        function selectIsland(name) {
            locationInput.value = name;
            checkDelivery();
        }

        // 初期化
        window.onload = loadCatalog;
    </script>
</body>
</html>
