            {prefecture: "鹿児島県", island: "黒島", city: "三島村", postalCodes: ["890-0902"]},
            {prefecture: "鹿児島県", island: "中之島", city: "十島村", postalCodes: ["891-5201"]},
            {prefecture: "鹿児島県", island: "諏訪之瀬島", city: "十島村", postalCodes: ["891-5203"]},
            {prefecture: "鹿児島県", island: "平島", city: "十島村", postalCodes: ["891-5202"]},
            {prefecture: "鹿児島県", island: "悪石島", city: "十島村", postalCodes: ["891-5204"]},
            {prefecture: "鹿児島県", island: "小宝島", city: "十島村", postalCodes: ["891-5205"]},
            {prefecture: "鹿児島県", island: "宝島", city: "十島村", postalCodes: ["891-5301"]},
            {prefecture: "北海道", island: "天売島", city: "苫前郡羽幌町", postalCodes: ["078-3951","078-3951~078-3955"]},
            {prefecture: "北海道", island: "利尻島", city: "利尻郡利尻富士町", postalCodes: ["097-0101","097-0102~097-0401"]},
            {prefecture: "北海道", island: "利尻島", city: "利尻郡利尻町", postalCodes: ["097-0211","097-0211~097-0311"]},
            {prefecture: "北海道", island: "礼文島", city: "礼文郡礼文町", postalCodes: ["097-1201"]},
            {prefecture: "北海道", island: "奥尻島", city: "奥尻郡奥尻町", postalCodes: ["043-1401","043-1402~043-1524"]}
        ];

        const productInput = document.getElementById('productCode');
        const locationInput = document.getElementById('location');
        const productNameDiv = document.getElementById('productName');
        const resultDiv = document.getElementById('result');

        productInput.addEventListener('input', () => {
            const code = productInput.value.trim();
            const product = catalog.find(p => p.id === code);
            if (product) {
                productNameDiv.textContent = "商品名: " + product.name;
            } else {
                productNameDiv.textContent = "";
            }
        });

        function showResult(message, type) {
            resultDiv.innerHTML = message;
            resultDiv.className = type;
            resultDiv.style.display = 'block';
        }

        function checkDelivery() {
            const code = productInput.value.trim();
            const loc = locationInput.value.trim();
            resultDiv.style.display = 'none';

            if (!code || !loc) {
                showResult('商品番号と配送先を入力してください。', 'error');
                return;
            }

            const product = catalog.find(p => p.id === code);
            if (!product) {
                showResult('該当する商品番号が見つかりません。', 'error');
                return;
            }

            // カタログ自体の制限チェック
            if (product.unavailable_flag) {
                showResult(`「${product.name}」は入力された地域への配送が出来ません。`, 'error');
                return;
            }

            const isPostal = /^\d{3}-?\d{4}$/.test(loc);
            const cleanPostal = loc.replace('-', '');
            
            let unavailable = false;
            let matches = [];

            if (product.carrier === '佐川') {
                if (isPostal) {
                    unavailable = sagawaData.some(d => d.postalCode.replace('-', '') === cleanPostal);
                } else {
                    matches = sagawaData.filter(d => d.city.includes(loc) || d.area.includes(loc));
                    const uniqueMatches = [];
                    const seen = new Set();
                    matches.forEach(m => {
                        const key = m.city + m.area;
                        if (!seen.has(key)) {
                            seen.add(key);
                            uniqueMatches.push(m);
                        }
                    });
                    matches = uniqueMatches;
                }
            } else {
                if (isPostal) {
                    unavailable = yamatoData.some(d => d.postalCodes.some(p => p.replace('-', '') === cleanPostal));
                } else {
                    matches = yamatoData.filter(d => d.island.includes(loc) || d.city.includes(loc));
                }
            }

            if (unavailable) {
                showResult(`「${product.name}」は入力された地域への配送が出来ません。`, 'error');
            } else if (matches.length > 1) {
                let html = '検索されたワードでは該当が複数存在します。下記から選択してください：<ul class="island-list">';
                matches.forEach(m => {
                    const name = product.carrier === '佐川' ? (m.city + ' ' + m.area) : (m.island + ' (' + m.city + ')');
                    html += `<li class="island-item" onclick="selectIsland('${name}')">${name}</li>`;
                });
                html += '</ul>';
                showResult(html, 'info');
            } else if (matches.length === 1) {
                showResult(`「${product.name}」は入力された地域への配送が出来ません。`, 'error');
            } else {
                showResult(`「${product.name}」は指定の地域へ配送可能です。`, 'success');
            }
        }

        function selectIsland(name) {
            locationInput.value = name;
            checkDelivery();
        }
    </script>
</body>
</html>
